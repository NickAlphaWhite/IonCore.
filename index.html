<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IonCore.</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #007AFF;
            --success: #34c759;
            --text-main: #FFFFFF;
            --text-secondary: #86868b;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 42px; font-weight: 700; letter-spacing: -0.04em; margin: 0; cursor: pointer; }
        .intro { font-size: 19px; color: var(--text-secondary); margin: 12px 0 32px 0; }
        
        .counter-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 8px; }
        
        .progress-track { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 48px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 12px rgba(0, 122, 255, 0.5); }

        .section-title { font-size: 14px; color: var(--text-secondary); margin: 24px 0 12px 0; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

        .ion-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .formula { font-family: "SF Mono", monospace; font-size: 20px; font-weight: 500; min-width: 100px; }

        .quiz-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--text-main);
            font-size: 17px;
            text-align: right;
            outline: none;
            width: 60%;
            padding: 4px 0;
            transition: all 0.3s ease;
        }

        .quiz-input:focus { border-bottom-color: var(--accent); }

        /* 正确后的状态 */
        .ion-card.correct { border-color: var(--success); background: rgba(52, 199, 89, 0.05); }
        .ion-card.correct .quiz-input { color: var(--success); border-bottom-color: transparent; font-weight: 600; }
        
        sub, sup { font-size: 0.6em; }
    </style>
</head>
<body>

<div class="container">
    <h1 onclick="location.reload()">IonCore.</h1>
    <p class="intro">Categorized by central element. Wish you 5.</p>
    
    <div class="counter-label" id="counter">IONS MASTERED: 0 / 20</div>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

    <div class="section-title">Nitrogen Center</div>
    <div class="ion-card" data-ans="ammonium"><div class="formula">NH<sub>4</sub><sup>+</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="nitrate"><div class="formula">NO<sub>3</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="nitrite"><div class="formula">NO<sub>2</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>

    <div class="section-title">Carbon Center</div>
    <div class="ion-card" data-ans="carbonate"><div class="formula">CO<sub>3</sub><sup>2-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="bicarbonate"><div class="formula">HCO<sub>3</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>

    <div class="section-title">Chlorine Center</div>
    <div class="ion-card" data-ans="perchlorate"><div class="formula">ClO<sub>4</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="chlorate"><div class="formula">ClO<sub>3</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="chlorite"><div class="formula">ClO<sub>2</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="hypochlorite"><div class="formula">ClO<sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>

    <div class="section-title">Sulfur Center</div>
    <div class="ion-card" data-ans="sulfate"><div class="formula">SO<sub>4</sub><sup>2-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="bisulfate"><div class="formula">HSO<sub>4</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="sulfite"><div class="formula">SO<sub>3</sub><sup>2-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="bisulfite"><div class="formula">HSO<sub>3</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="thiosulfate"><div class="formula">S<sub>2</sub>O<sub>3</sub><sup>2-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>

    <div class="section-title">Phosphorus Center</div>
    <div class="ion-card" data-ans="phosphate"><div class="formula">PO<sub>4</sub><sup>3-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="hydrogen phosphate"><div class="formula">HPO<sub>4</sub><sup>2-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="dihydrogen phosphate"><div class="formula">H<sub>2</sub>PO<sub>4</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>

    <div class="section-title">Metal Centers</div>
    <div class="ion-card" data-ans="permanganate"><div class="formula">MnO<sub>4</sub><sup>-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="dichromate"><div class="formula">Cr<sub>2</sub>O<sub>7</sub><sup>2-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
    <div class="ion-card" data-ans="chromate"><div class="formula">CrO<sub>4</sub><sup>2-</sup></div><input type="text" class="quiz-input" placeholder="Name..."></div>
</div>

<script>
    const inputs = document.querySelectorAll('.quiz-input');
    const progressFill = document.getElementById('progress');
    const counterLabel = document.getElementById('counter');

    inputs.forEach(input => {
        input.addEventListener('input', (e) => {
            const card = e.target.closest('.ion-card');
            const answer = card.getAttribute('data-ans');
            const value = e.target.value.toLowerCase().trim();

            if (value === answer) {
                card.classList.add('correct');
                e.target.disabled = true;
                e.target.value = answer.charAt(0).toUpperCase() + answer.slice(1);
                updateUI();
            }
        });
    });

    function updateUI() {
        const total = inputs.length;
        const correct = document.querySelectorAll('.ion-card.correct').length;
        const percent = (correct / total) * 100;
        
        progressFill.style.width = percent + '%';
        counterLabel.innerText = `IONS MASTERED: ${correct} / ${total}`;
        
        if(correct === total) {
            counterLabel.innerText = "🎉 ALL MASTERED! TAP TITLE TO RESET";
            counterLabel.style.color = "var(--success)";
        }
    }
</script>
</body>
</html>
